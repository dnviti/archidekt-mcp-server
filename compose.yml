services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: archidekt-mcp-server:latest
    depends_on:
      - redis
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ARCHIDEKT_MCP_REDIS_URL: redis://redis:6379/0
      ARCHIDEKT_MCP_USER_AGENT: archidekt-mcp-server/0.3 (+mailto:replace-me@example.com)
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  redis-data:
